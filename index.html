<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mantela Viewer</title>
<script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js" defer></script>
<script src="./mantela.js" defer></script>
<style>
html, body {
    height: 100%;
    display: flex;
    flex-direction: column;
	overflow: hidden;
}
footer {
    margin-top: auto;
}
.mandala-container {
    flex: 1;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}
.mandala {
    width: 100%;
    height: 100%;
}
</style>
</head>
<body>
<header>
<h1>Mantela Viewer</h1>
</header>
<section>
<form>
<fieldset>
<legend>Settings</legend>
<label for="first">
URL of the first <code>mantela.json</code>:
<input type="url" id="first" name="first" value="https://108jiminy.jp/phone/jiminypublicmantela.json" required>
</label>
<button>Generate Mandala</button>
</fieldset>
</form>
<form>
<fieldset>
<legend>Info</legend>
<label id="node-info">
スタートノード（provider）とターゲットノード（extension）をクリックして経路を確認してください。
</label>
</form>
</section>
<main class="mandala-container">
<section id="mandala" class="mandala"></section>
</main>
<footer>
<a href="https://github.com/KusaReMKN/mantela">オリジナル(KusaReMKN)</a>
<a href="https://github.com/108jiminy/mantela">GitHub</a>
</footer>
</body>
</html>
